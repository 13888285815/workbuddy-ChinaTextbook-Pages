- generic [ref=e2]: "<!DOCTYPE html> <html lang=\"zh-CN\"> <head> <meta charset=\"UTF-8\"> <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"> <title>中国教材电子课本</title> <link rel=\"icon\" href=\"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>\"> <link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css\"> <style> *{margin:0;padding:0;box-sizing:border-box} body{font-family:-apple-system,\"PingFang SC\",\"Microsoft YaHei\",sans-serif;background:linear-gradient(145deg,#0f1639 0%,#121e54 40%,#161a3c 100%);min-height:100vh;color:#e6e8f5;overflow:hidden} button,input{font:inherit} .container{display:flex;flex-direction:column;height:100vh;overflow:hidden} /* Top Bar */ .top-bar{height:56px;background:rgba(12,21,55,.92);backdrop-filter:blur(12px);display:flex;align-items:center;padding:0 22px;gap:16px;box-shadow:0 15px 40px rgba(0,0,0,.18);z-index:100;transition:transform .3s} .top-bar .logo{display:flex;align-items:center;gap:10px;color:#f8f9fc;font-size:18px;font-weight:700;white-space:nowrap} .top-bar .logo span{color:#8f98c8;font-size:13px;font-weight:400} .search-global{position:relative;flex:1;max-width:420px} .search-global input{width:100%;padding:10px 14px 10px 38px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(18,29,70,.95);color:#f4f6ff;outline:none;transition:border .2s,box-shadow .2s} .search-global input:focus{border-color:#7c5dfc;box-shadow:0 0 0 4px rgba(124,93,252,.1)} .search-global i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8f98c8} .user-area{display:flex;align-items:center;gap:10px} .user-area .avatar{width:34px;height:34px;border-radius:50%;background:#7c5dfc;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 8px 20px rgba(124,93,252,.25)} .menu-toggle{display:none;width:38px;height:38px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#c7d1f4;align-items:center;justify-content:center;cursor:pointer} /* Main Layout */ .main{display:flex;flex:1;overflow:hidden;margin-top:12px} .sidebar{width:280px;min-width:240px;background:rgba(10,18,46,.96);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden;box-shadow:10px 0 40px rgba(0,0,0,.08);transition:margin-left .3s} .sidebar.hidden{margin-left:-280px} .sidebar-header{padding:18px 18px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px} .sidebar-header h3{font-size:14px;color:#f2f5ff;letter-spacing:.02em} .sidebar-header .count{font-size:12px;color:#9aabc7;background:rgba(255,255,255,.06);padding:4px 9px;border-radius:999px} .search-box{padding:0 18px 14px} .search-box input{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(22,33,70,.95);color:#eef2ff;outline:none} .search-box input:focus{border-color:#7c5dfc} .tree-wrap{flex:1;overflow:auto;padding:8px 0 14px} .tree-wrap::-webkit-scrollbar{width:8px} .tree-wrap::-webkit-scrollbar-thumb{background:rgba(124,93,252,.35);border-radius:999px} /* Windows资源管理器风格树形结构 */ .tree-node{position:relative;margin:1px 0} .tree-label{display:flex;align-items:center;gap:6px;padding:7px 10px 7px 16px;cursor:pointer;transition:background .2s,color .2s;color:#d4dbf0;position:relative;font-size:13px;border-radius:8px;user-select:none} .tree-label:hover{background:rgba(255,255,255,.08);color:#fff} .tree-label.active{color:#fff;background:rgba(124,93,252,.22)} .tree-label.selected{color:#fff;background:rgba(124,93,252,.35)} .tree-arrow{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:#a8b4d8;transition:transform .2s;font-size:9px;flex-shrink:0} .tree-arrow.rotated{transform:rotate(90deg)} .tree-arrow.empty{visibility:hidden} .tree-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0} .tree-icon.folder{color:#ffd166} .tree-icon.file{color:#7c5dfc} .tree-icon.level-1{color:#ffd166} .tree-icon.level-2{color:#6bb3ff} .tree-icon.level-3{color:#8f9cf5} .tree-name{flex:1;text-overflow:ellipsis;white-space:nowrap;overflow:hidden;line-height:1.4} .tree-count{font-size:11px;color:#8f98c8;background:rgba(255,255,255,.08);padding:2px 7px;border-radius:10px;flex-shrink:0} .tree-children{display:none;flex-direction:column;position:relative} .tree-children.open{display:flex} /* 连接线效果 */ .tree-children::before{content:'';position:absolute;left:22px;top:0;bottom:8px;width:1px;background:rgba(255,255,255,.1)} .tree-node.level-2>.tree-label{padding-left:30px} .tree-node.level-3>.tree-label{padding-left:44px} /* 展开状态样式 - 一级目录默认展开 */ .tree-node.expanded>.tree-label .tree-arrow{transform:rotate(90deg)} .tree-node:not(.expanded)>.tree-label .tree-arrow{transform:rotate(0deg)} .highlight-match{background:rgba(124,93,252,.45);color:#fff;border-radius:3px;padding:0 2px} .splitter-v{width:6px;background:transparent;cursor:col-resize;transition:background .2s} .splitter-v:hover{background:rgba(124,93,252,.12)} /* Thumbnail Panel */ .thumb-panel{width:220px;min-width:180px;background:rgba(8,16,42,.96);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden;transition:margin-right .3s} .thumb-panel.hidden{margin-right:-220px;width:0;min-width:0;overflow:hidden} .thumb-header{padding:16px 16px 12px;font-size:12px;color:#9aabd9;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px} .thumb-list{flex:1;overflow:auto;padding:12px} .thumb-item{margin-bottom:12px;border-radius:14px;overflow:hidden;border:1px solid transparent;background:rgba(255,255,255,.02);cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s} .thumb-item:hover{transform:translateY(-1px);border-color:rgba(124,93,252,.3);box-shadow:0 12px 30px rgba(0,0,0,.12)} .thumb-item.active{border-color:#7c5dfc} .page-img{width:100%;aspect-ratio:3/4;background:linear-gradient(180deg,#1d234d 0%,#131a34 100%);display:flex;align-items:center;justify-content:center;color:#7f8beb;font-size:13px} .page-num{text-align:center;padding:8px 0;font-size:11px;color:#94a3c7} /* Preview Area */ .preview-area{flex:1;display:flex;flex-direction:column;overflow:hidden;border-radius:24px;position:relative;background:linear-gradient(180deg,rgba(15,21,55,.98),rgba(9,15,38,.98));box-shadow:0 10px 30px rgba(0,0,0,.25);margin-right:18px} .preview-toolbar{height:56px;padding:0 18px;display:flex;align-items:center;gap:10px;background:rgba(12,20,49,.98);border-bottom:1px solid rgba(255,255,255,.06);flex-wrap:nowrap;overflow-x:auto;transition:transform .3s} .tool-group{display:flex;align-items:center;gap:8px;flex-shrink:0} .tbtn{width:38px;height:38px;border-radius:12px;border:1px solid transparent;background:rgba(255,255,255,.04);color:#c7d1f4;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0} .tbtn:hover{border-color:rgba(124,93,252,.35);background:rgba(124,93,252,.12);color:#fff} .tbtn.active{background:#7c5dfc;color:#fff;border-color:#7c5dfc} .tool-sep{width:1px;height:24px;background:rgba(255,255,255,.1);flex-shrink:0} .zoom-info{font-size:12px;color:#9fb4d8;min-width:58px;text-align:center} .page-info{display:flex;align-items:center;gap:8px;margin-left:auto;color:#9fb4d8;font-size:12px;flex-shrink:0} .page-info input{width:50px;padding:8px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(18,28,61,.95);color:#f4f6ff;outline:none;text-align:center} /* PDF Viewer Body */ .preview-body{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden} .preview-body::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(124,93,252,.16),transparent 32%),radial-gradient(circle at bottom left,rgba(49,90,255,.12),transparent 28%);pointer-events:none} .pdf-viewer{position:relative;display:flex;align-items:flex-start;justify-content:center;overflow:auto;width:100%;height:100%} .pdf-canvas-wrap{position:relative;flex-shrink:0} .pdf-canvas-wrap canvas{display:block} .annotation-canvas{position:absolute;left:0;top:0;touch-action:none} .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#8f9ecb;gap:10px;text-align:center;padding:0 18px} .empty-state i{font-size:60px;opacity:.38} /* Loading Overlay */ .loading-overlay{position:absolute;inset:0;background:rgba(10,16,40,.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:50;border-radius:24px} .loading-overlay.show{display:flex} .loading-spinner{width:48px;height:48px;border:4px solid rgba(124,93,252,.2);border-top-color:#7c5dfc;border-radius:50%;animation:spin .8s linear infinite} @keyframes spin{to{transform:rotate(360deg)}} .loading-text{color:#9fb4d8;font-size:13px} /* Status Bar */ .status-bar{height:46px;padding:0 20px;display:flex;align-items:center;gap:18px;font-size:12px;color:#9fb4d8;background:rgba(12,20,47,.92);border-top:1px solid rgba(255,255,255,.06);transition:transform .3s} .status-bar span{white-space:nowrap} /* Modal */ .modal-bg{position:fixed;inset:0;background:rgba(6,11,28,.82);display:none;align-items:center;justify-content:center;z-index:1100} .modal-bg.show{display:flex} .modal-box{width:min(420px,calc(100%-32px));background:rgba(17,25,55,.98);border:1px solid rgba(124,93,252,.25);border-radius:24px;padding:28px;box-shadow:0 30px 90px rgba(0,0,0,.35)} .modal-box h3{font-size:18px;color:#fff;margin-bottom:10px} .modal-box p{font-size:13px;color:#a2b0d9;margin-bottom:18px} .modal-box input{width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(12,21,50,.96);color:#eef2ff;outline:none} .modal-btns{display:flex;justify-content:flex-end;gap:12px;margin-top:18px} .mbtn{padding:11px 18px;border-radius:14px;border:none;cursor:pointer;transition:all .2s} .mbtn-ok{background:#7c5dfc;color:#fff} .mbtn-cancel{background:rgba(255,255,255,.08);color:#d2d8ff} .toast{position:fixed;bottom:28px;right:28px;padding:14px 18px;border-radius:14px;background:rgba(124,93,252,.98);color:#fff;font-size:13px;box-shadow:0 20px 60px rgba(18,25,68,.35);opacity:0;transform:translateY(10px);transition:.3s ease;pointer-events:none;z-index:1200} .toast.show{opacity:1;transform:translateY(0)} /* Fullscreen Mode */ body.fullscreen .top-bar,body.fullscreen .sidebar,body.fullscreen .thumb-panel,body.fullscreen .status-bar,body.fullscreen .splitter-v{display:none!important} body.fullscreen .main{margin-top:0} body.fullscreen .preview-area{margin:0;border-radius:0} body.fullscreen .preview-toolbar{background:rgba(12,20,49,.98);position:sticky;top:0;z-index:10} /* Keyboard shortcut hint */ .shortcut-hint{position:fixed;bottom:80px;right:28px;background:rgba(17,25,55,.95);border:1px solid rgba(124,93,252,.2);border-radius:16px;padding:16px 20px;font-size:12px;color:#9fb4d8;z-index:1050;display:none;min-width:200px} .shortcut-hint.show{display:block} .shortcut-hint h4{color:#fff;margin-bottom:8px;font-size:13px} .shortcut-hint div{display:flex;justify-content:space-between;gap:12px;padding:3px 0} .shortcut-hint kbd{background:rgba(124,93,252,.2);padding:2px 8px;border-radius:6px;color:#c7d1f4;font-family:inherit;font-size:11px} /* Bookmark indicator */ .bookmark-indicator{position:absolute;top:8px;right:8px;color:#ffd966;font-size:14px;opacity:0;transition:opacity .3s} .thumb-item.bookmarked .bookmark-indicator{opacity:1} /* Responsive */ @media(max-width:1180px){.main{flex-direction:column}.sidebar,.thumb-panel{width:100%;min-width:auto}.preview-area{margin-right:0;border-radius:0}.splitter-v{display:none}} @media(max-width:980px){.thumb-panel{display:none}.preview-area{margin-left:0}.sidebar{height:260px;min-height:220px;overflow:auto}.preview-body{padding:16px}} @media(max-width:760px){.menu-toggle{display:flex}.top-bar{padding:0 12px;gap:10px}.top-bar .logo span{display:none}.search-global{order:10;width:100%;max-width:none}.top-bar{flex-wrap:wrap}.preview-toolbar{gap:6px;padding:0 10px;height:48px}.tbtn{width:34px;height:34px;border-radius:10px}.page-info{margin-left:0}.preview-body{padding:8px}.status-bar{flex-wrap:wrap;gap:10px;height:auto;padding:12px}.sidebar{position:fixed;left:0;top:56px;bottom:46px;width:300px;z-index:200;margin-left:0;transform:translateX(-100%);transition:transform .3s}.sidebar.mobile-open{transform:translateX(0)}.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}.sidebar-backdrop.show{display:block}} /* Floating sidebar toggle - always visible */ .sidebar-float-toggle{position:fixed;left:12px;bottom:60px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#7c5dfc,#5b3de8);color:#fff;border:none;box-shadow:0 8px 24px rgba(124,93,252,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:250;font-size:18px;transition:transform .2s,box-shadow .2s} .sidebar-float-toggle:hover{transform:scale(1.1);box-shadow:0 12px 32px rgba(124,93,252,.5)} .sidebar-float-toggle.hide{display:none} @media(min-width:761px){.sidebar-float-toggle{display:none}} </script> <script src=\"context-menu.js\"></script> <script type=\"module\"> import * as pdfjsLib from './pdfjs/pdf.mjs'; window.pdfjsLib = pdfjsLib; pdfjsLib.GlobalWorkerOptions.workerSrc = './pdfjs/pdf.worker.mjs'; // Fallback: if worker fails, use main thread (slower but functional) pdfjsLib.GlobalWorkerOptions.workerPort = null; window.addEventListener('error', function(e) { if (e.message && e.message.includes('worker')) { console.warn('PDF.js worker 加载失败，切换到主线程渲染'); pdfjsLib.GlobalWorkerOptions.workerSrc = ''; } }); </script> </head> <body> <div class=\"container\"> <header class=\"top-bar\"> <button class=\"menu-toggle\" onclick=\"toggleSidebar()\" title=\"菜单\"><i class=\"fas fa-bars\"></i></button> <div class=\"logo\"><i class=\"fas fa-school\"></i> 中国教材电子课本 <span>可视化教材浏览</span></div> <div class=\"search-global\"> <i class=\"fas fa-search\"></i> <input id=\"globalSearch\" type=\"text\" placeholder=\"搜索教材名称、学科、版本...\" oninput=\"onSearch(this.value)\"> </div> <div class=\"user-area\"> <button class=\"tbtn\" onclick=\"toggleShortcuts()\" title=\"快捷键\"><i class=\"fas fa-keyboard\"></i></button> <button class=\"tbtn\" onclick=\"showTokenModal()\" title=\"Token设置\"><i class=\"fas fa-key\"></i></button> <div class=\"avatar\">U</div> </div> </header> <section class=\"main\"> <div class=\"sidebar-backdrop\" id=\"sidebarBackdrop\" onclick=\"toggleSidebar()\"></div> <aside class=\"sidebar\" id=\"sidebar\"> <div class=\"sidebar-header\"> <h3><i class=\"fas fa-folder-tree\"></i> 教材目录</h3> <span class=\"count\" id=\"catalogCount\">加载中</span> </div> <div class=\"search-box\"> <input id=\"treeSearch\" type=\"text\" placeholder=\"筛选目录...\" oninput=\"onSearch(this.value)\"> </div> <div class=\"tree-wrap\" id=\"treeWrap\"></div> </aside> <div class=\"splitter-v\"></div> <aside class=\"thumb-panel\" id=\"thumbPanel\"> <div class=\"thumb-header\"><i class=\"fas fa-th-list\"></i> 页面缩略图</div> <div class=\"thumb-list\" id=\"thumbList\"> <div class=\"empty-state\" style=\"height:180px\"><i class=\"fas fa-file-pdf\"></i><p>选择教材后显示页面缩略图</p></div> </div> </aside> <div class=\"splitter-v\"></div> <main class=\"preview-area\"> <div class=\"preview-toolbar\"> <div class=\"tool-group\"> <button class=\"tbtn\" onclick=\"activateTool('annotate')\" id=\"btnAnnotate\" title=\"标注\"><i class=\"fas fa-highlighter\"></i></button> <button class=\"tbtn\" onclick=\"activateTool('pen')\" id=\"btnPen\" title=\"画笔\"><i class=\"fas fa-pen\"></i></button> <button class=\"tbtn\" onclick=\"activateTool('text')\" id=\"btnText\" title=\"文字\"><i class=\"fas fa-font\"></i></button> <button class=\"tbtn\" onclick=\"activateTool('eraser')\" id=\"btnEraser\" title=\"橡皮擦\"><i class=\"fas fa-eraser\"></i></button> </div> <div class=\"tool-group\"> <button class=\"tbtn\" onclick=\"undoAction()\" title=\"撤销\"><i class=\"fas fa-undo\"></i></button> <button class=\"tbtn\" onclick=\"redoAction()\" title=\"重做\"><i class=\"fas fa-redo\"></i></button> </div> <div class=\"tool-sep\"></div> <div class=\"tool-group\"> <button class=\"tbtn\" onclick=\"zoomOut()\" title=\"缩小 (−)\"><i class=\"fas fa-search-minus\"></i></button> <span class=\"zoom-info\" id=\"zoomInfo\">100%</span> <button class=\"tbtn\" onclick=\"zoomIn()\" title=\"放大 (+)\"><i class=\"fas fa-search-plus\"></i></button> <button class=\"tbtn\" onclick=\"zoomFit()\" title=\"适应宽度 (0)\"><i class=\"fas fa-expand\"></i></button> </div> <div class=\"tool-sep\"></div> <div class=\"tool-group\"> <button class=\"tbtn\" onclick=\"toggleBookmark()\" id=\"btnBookmark\" title=\"书签 (B)\"><i class=\"fas fa-bookmark\"></i></button> <button class=\"tbtn\" onclick=\"toggleFullscreen()\" id=\"btnFullscreen\" title=\"全屏 (F)\"><i class=\"fas fa-expand-arrows-alt\"></i></button> <button class=\"tbtn\" onclick=\"downloadPDF()\" title=\"下载\"><i class=\"fas fa-download\"></i></button> <button class=\"tbtn\" onclick=\"shareDocument()\" title=\"分享\"><i class=\"fas fa-share-alt\"></i></button> </div> <div class=\"page-info\"> <button class=\"tbtn\" onclick=\"prevPage()\" title=\"上一页 (←)\" style=\"width:30px;height:30px\"><i class=\"fas fa-chevron-left\"></i></button> <span id=\"pageLabel\">-</span> <input id=\"pageInput\" type=\"number\" min=\"1\" value=\"1\" onkeydown=\"if(event.key==='Enter')goToPage(this.value)\"> <span>/ <span id=\"pageTotal\">-</span></span> <button class=\"tbtn\" onclick=\"nextPage()\" title=\"下一页 (→)\" style=\"width:30px;height:30px\"><i class=\"fas fa-chevron-right\"></i></button> </div> </div> <div class=\"preview-body\" id=\"previewBody\"> <div class=\"empty-state\" id=\"emptyState\"> <i class=\"fas fa-book-open\"></i> <p>请从左侧选择教材进行预览</p> <span style=\"font-size:12px;color:#6b7db3\">支持 PDF 浏览、缩放、标注、书签 · 按 <kbd style=\"background:rgba(124,93,252,.2);padding:2px 6px;border-radius:4px\">?</kbd> 查看快捷键</span> </div> <div id=\"pdfViewer\" class=\"pdf-viewer\" style=\"display:none\"> <div class=\"pdf-canvas-wrap\" id=\"pdfCanvasWrap\"> <canvas id=\"pdfCanvas\"></canvas> <canvas id=\"annotationCanvas\" class=\"annotation-canvas\"></canvas> </div> </div> <div class=\"loading-overlay\" id=\"loadingOverlay\"> <div class=\"loading-spinner\"></div> <div class=\"loading-text\" id=\"loadingText\">正在加载 PDF...</div> </div> </div> </main> </section> <footer class=\"status-bar\"> <span id=\"statusFile\">未选择文件</span> <span id=\"statusSize\"></span> <span id=\"statusZoom\"></span> <span id=\"statusBookmark\"></span> <span style=\"margin-left:auto\" id=\"statusToken\">免费用户</span> </footer> </div> <div class=\"modal-bg\" id=\"tokenModal\"> <div class=\"modal-box\"> <h3><i class=\"fas fa-key\"></i> 会员 Token</h3> <p>请输入 Token 后可解锁更多功能，支持 PRE_高级 或 BASIC_基础 token。</p> <input id=\"tokenInput\" type=\"text\" placeholder=\"输入 Token (如 PRE_高级/BASIC_基础)\" onkeydown=\"if(event.key==='Enter')submitToken()\"> <div class=\"modal-btns\"> <button class=\"mbtn mbtn-cancel\" onclick=\"closeModal()\">取消</button> <button class=\"mbtn mbtn-ok\" onclick=\"submitToken()\">确认</button> </div> </div> </div> <div class=\"toast\" id=\"toast\"></div> <div class=\"shortcut-hint\" id=\"shortcutHint\"> <h4><i class=\"fas fa-keyboard\"></i> 快捷键 <span style=\"font-size:11px;color:#ffd166;float:right;\">需授权</span></h4> <div><span>上一页</span><kbd>←</kbd> <kbd>PgUp</kbd></div> <div><span>下一页</span><kbd>→</kbd> <kbd>PgDn</kbd> <kbd>Space</kbd></div> <div><span>第一页</span><kbd>Home</kbd></div> <div><span>最后一页</span><kbd>End</kbd></div> <div><span>放大</span><kbd>+</kbd></div> <div><span>缩小</span><kbd>-</kbd></div> <div><span>适应宽度</span><kbd>0</kbd></div> <div><span>全屏</span><kbd>F</kbd></div> <div><span>书签</span><kbd>B</kbd></div> <div><span>目录</span><kbd>T</kbd></div> <div><span>搜索</span><kbd>/</kbd></div> <div><span>跳转页码</span><kbd>G</kbd></div> <div><span>快捷键帮助</span><kbd>?</kbd> <span style=\"font-size:10px;color:#8f98c8;\">(无需授权)</span></div> <div><span>退出全屏</span><kbd>Esc</kbd></div> <div style=\"margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:#8f98c8;\"> 提示：数字键 1-9 可快速跳转到第 n×10 页 </div> <div style=\"margin-top:8px;font-size:11px;color:#8f98c8;\"> Ctrl/Cmd 组合键：F搜索、B书签、T目录、M全屏 </div> <div style=\"margin-top:8px;font-size:11px;color:#ffd166;\"> ⚠️ 所有功能需要设置Token后才能使用 </div> </div> <button class=\"sidebar-float-toggle\" id=\"sidebarFloatToggle\" onclick=\"toggleSidebar()\" title=\"打开目录\"><i class=\"fas fa-folder-tree\"></i></button> <!-- 右键菜单 --> <div id=\"contextMenu\" style=\"position:fixed;display:none;z-index:9999;min-width:200px;max-height:80vh;overflow-y:auto;background:rgba(20,30,60,.98);border:1px solid rgba(255,255,255,.1);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.3);backdrop-filter:blur(12px);padding:8px 0;\"> <!-- 缩放 --> <div onclick=\"contextMenuAction('zoomIn')\" style=\"padding:10px 16px;cursor:pointer;color:#d4dbf0;font-size:13px;transition:background .2s;display:flex;align-items:center;gap:10px;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\"> <i class=\"fas fa-search-plus\" style=\"width:16px;color:#7c5dfc\"></i> 放大 <span style=\"margin-left:auto;color:#8f98c8;font-size:11px;\">+</span> </div> <div onclick=\"contextMenuAction('zoomOut')\" style=\"padding:10px 16px;cursor:pointer;color:#d4dbf0;font-size:13px;transition:background .2s;display:flex;align-items:center;gap:10px;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\"> <i class=\"fas fa-search-minus\" style=\"width:16px;color:#7c5dfc\"></i> 缩小 <span style=\"margin-left:auto;color:#8f98c8;font-size:11px;\">-</span> </div> <div onclick=\"contextMenuAction('zoomFit')\" style=\"padding:10px 16px;cursor:pointer;color:#d4dbf0;font-size:13px;transition:background .2s;display:flex;align-items:center;gap:10px;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\"> <i class=\"fas fa-expand\" style=\"width:16px;color:#7c5dfc\"></i> 适应宽度 <span style=\"margin-left:auto;color:#8f98c8;font-size:11px;\">0</span> </div> <div style=\"height:1px;background:rgba(255,255,255,.1);margin:4px 16px;\"></div> <!-- 翻页 --> <div onclick=\"contextMenuAction('prevPage')\" style=\"padding:10px 16px;cursor:pointer;color:#d4dbf0;font-size:13px;transition:background .2s;display:flex;align-items:center;gap:10px;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\"> <i class=\"fas fa-chevron-left\" style=\"width:16px;color:#7c5dfc\"></i> 上一页 <span style=\"margin-left:auto;color:#8f98c8;font-size:11px;\">← / PgUp</span> </div> <div onclick=\"contextMenuAction('nextPage')\" style=\"padding:10px 16px;cursor:pointer;color:#d4dbf0;font-size:13px;transition:background .2s;display:flex;align-items:center;gap:10px;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\"> <i class=\"fas fa-chevron-right\" style=\"width:16px;color:#7c5dfc\"></i> 下一页 <span style=\"margin-left:auto;color:#8f98c8;font-size:11px;\">→ / PgDn</span> </div> <div onclick=\"contextMenuAction('firstPage')\" style=\"padding:10px 16px;cursor:pointer;color:#d4dbf0;font-size:13px;transition:background .2s;display:flex;align-items:center;gap:10px;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\"> <i class=\"fas fa-angle-double-left\" style=\"width:16px;color:#7c5dfc\"></i> 第一页 <span style=\"margin-left:auto;color:#8f98c8;font-size:11px;\">Home</span> </div> <div onclick=\"contextMenuAction('lastPage')\" style=\"padding:10px 16px;cursor:pointer;color:#d4dbf0;font-size:13px;transition:background .2s;display:flex;align-items:center;gap:10px;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\"> <i class=\"fas fa-angle-double-right\" style=\"width:16px;color:#7c5dfc\"></i> 最后一页 <span style=\"margin-left:auto;color:#8f98c8;font-size:11px;\">End</span> </div> <div onclick=\"contextMenuAction('goToPage')\" style=\"padding:10px 16px;cursor:pointer;color:#d4dbf0;font-size:13px;transition:background .2s;display:flex;align-items:center;gap:10px;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\"> <i class=\"fas fa-arrow-circle-right\" style=\"width:16px;color:#7c5dfc\"></i> 跳转到页 <span style=\"margin-left:auto;color:#8f98c8;font-size:11px;\">G</span> </div> <div style=\"height:1px;background:rgba(255,255,255,.1);margin:4px 16px;\"></div> <!-- 功能 --> <div onclick=\"contextMenuAction('toggleBookmark')\" style=\"padding:10px 16px;cursor:pointer;color:#d4dbf0;font-size:13px;transition:background .2s;display:flex;align-items:center;gap:10px;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\"> <i class=\"fas fa-bookmark\" style=\"width:16px;color:#7c5dfc\"></i> 书签 <span style=\"margin-left:auto;color:#8f98c8;font-size:11px;\">B</span> </div> <div onclick=\"contextMenuAction('fullscreen')\" style=\"padding:10px 16px;cursor:pointer;color:#d4dbf0;font-size:13px;transition:background .2s;display:flex;align-items:center;gap:10px;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\"> <i class=\"fas fa-expand-arrows-alt\" style=\"width:16px;color:#7c5dfc\"></i> 全屏 <span style=\"margin-left:auto;color:#8f98c8;font-size:11px;\">F</span> </div> <div onclick=\"contextMenuAction('toggleSidebar')\" style=\"padding:10px 16px;cursor:pointer;color:#d4dbf0;font-size:13px;transition:background .2s;display:flex;align-items:center;gap:10px;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\"> <i class=\"fas fa-folder-tree\" style=\"width:16px;color:#7c5dfc\"></i> 目录 <span style=\"margin-left:auto;color:#8f98c8;font-size:11px;\">T</span> </div> <div onclick=\"contextMenuAction('search')\" style=\"padding:10px 16px;cursor:pointer;color:#d4dbf0;font-size:13px;transition:background .2s;display:flex;align-items:center;gap:10px;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\"> <i class=\"fas fa-search\" style=\"width:16px;color:#7c5dfc\"></i> 搜索教材 <span style=\"margin-left:auto;color:#8f98c8;font-size:11px;\">/</span> </div> <div style=\"height:1px;background:rgba(255,255,255,.1);margin:4px 16px;\"></div> <!-- 快速跳转 --> <div style=\"padding:8px 16px;color:#8f98c8;font-size:11px;user-select:none;\">快速跳转 (数字键)</div> <div onclick=\"contextMenuAction('jump10')\" style=\"padding:8px 16px;cursor:pointer;color:#d4dbf0;font-size:12px;transition:background .2s;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\">第 10 页 <span style=\"float:right;color:#8f98c8;font-size:10px;\">1</span></div> <div onclick=\"contextMenuAction('jump20')\" style=\"padding:8px 16px;cursor:pointer;color:#d4dbf0;font-size:12px;transition:background .2s;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\">第 20 页 <span style=\"float:right;color:#8f98c8;font-size:10px;\">2</span></div> <div onclick=\"contextMenuAction('jump30')\" style=\"padding:8px 16px;cursor:pointer;color:#d4dbf0;font-size:12px;transition:background .2s;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\">第 30 页 <span style=\"float:right;color:#8f98c8;font-size:10px;\">3</span></div> <div onclick=\"contextMenuAction('jump40')\" style=\"padding:8px 16px;cursor:pointer;color:#d4dbf0;font-size:12px;transition:background .2s;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\">第 40 页 <span style=\"float:right;color:#8f98c8;font-size:10px;\">4</span></div> <div onclick=\"contextMenuAction('jump50')\" style=\"padding:8px 16px;cursor:pointer;color:#d4dbf0;font-size:12px;transition:background .2s;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\">第 50 页 <span style=\"float:right;color:#8f98c8;font-size:10px;\">5</span></div> <div style=\"height:1px;background:rgba(255,255,255,.1);margin:4px 16px;\"></div> <!-- 帮助 --> <div onclick=\"contextMenuAction('help')\" style=\"padding:10px 16px;cursor:pointer;color:#d4dbf0;font-size:13px;transition:background .2s;display:flex;align-items:center;gap:10px;\" onmouseover=\"this.style.background='rgba(124,93,252,.2)'\" onmouseout=\"this.style.background='transparent'\"> <i class=\"fas fa-keyboard\" style=\"width:16px;color:#7c5dfc\"></i> 快捷键帮助 <span style=\"margin-left:auto;color:#8f98c8;font-size:11px;\">?</span> </div> </div> <script> // === State === let catalog = []; const treeWrap = document.getElementById('treeWrap'); const thumbList = document.getElementById('thumbList'); const emptyState = document.getElementById('emptyState'); const pdfViewer = document.getElementById('pdfViewer'); const pdfCanvasWrap = document.getElementById('pdfCanvasWrap'); const pdfCanvas = document.getElementById('pdfCanvas'); const annotationCanvas = document.getElementById('annotationCanvas'); const pdfCtx = pdfCanvas.getContext('2d'); const annCtx = annotationCanvas.getContext('2d'); const statusFile = document.getElementById('statusFile'); const statusSize = document.getElementById('statusSize'); const statusZoom = document.getElementById('statusZoom'); const statusToken = document.getElementById('statusToken'); const statusBookmark = document.getElementById('statusBookmark'); const zoomInfo = document.getElementById('zoomInfo'); const pageLabel = document.getElementById('pageLabel'); const pageTotal = document.getElementById('pageTotal'); const pageInput = document.getElementById('pageInput'); const catalogCount = document.getElementById('catalogCount'); const loadingOverlay = document.getElementById('loadingOverlay'); const loadingText = document.getElementById('loadingText'); let current = null; let activeTool = null; let pdfDoc = null; let currentPage = 1; let pdfScale = 1; let historyStack = []; let futureStack = []; let annotationActions = []; let drawing = false; let currentStroke = null; let thumbObserver = null; // === Annotations Storage === function getAnnotationKey() { return current?.pdf ? `ct_ann_${encodeURIComponent(current.pdf)}` : null; } function saveAnnotations() { const key = getAnnotationKey(); if (!key) return; localStorage.setItem(key, JSON.stringify(annotationActions)); } function loadAnnotations() { const key = getAnnotationKey(); if (!key) { annotationActions = []; return; } try { annotationActions = JSON.parse(localStorage.getItem(key) || '[]'); } catch { annotationActions = []; } } // === Bookmark === function getBookmarkKey(pdf) { return `ct_bm_${encodeURIComponent(pdf || current?.pdf || '')}`; } function toggleBookmark() { if (!current || !pdfDoc) { showToast('请先选择教材'); return; } const key = getBookmarkKey(); const existing = localStorage.getItem(key); if (existing) { localStorage.removeItem(key); statusBookmark.textContent = ''; showToast('书签已移除'); } else { localStorage.setItem(key, JSON.stringify({ page: currentPage, title: current.title })); statusBookmark.textContent = `📖 第${currentPage}页`; showToast(`已保存书签：第 ${currentPage} 页`); } updateThumbBookmarks(); } function loadBookmark() { if (!current) return null; const key = getBookmarkKey(); try { const bm = JSON.parse(localStorage.getItem(key)); if (bm?.page) { statusBookmark.textContent = `📖 第${bm.page}页`; return bm.page; } } catch {} statusBookmark.textContent = ''; return null; } function updateThumbBookmarks() { if (!current) return; const key = getBookmarkKey(); let bmPage = null; try { bmPage = JSON.parse(localStorage.getItem(key))?.page; } catch {} document.querySelectorAll('.thumb-item').forEach(el => { el.classList.toggle('bookmarked', Number(el.dataset.page) === bmPage); }); } // === Tree Rendering (Windows Explorer Style) === function renderTree(list) { treeWrap.innerHTML = ''; catalogCount.textContent = flattenCount(list); if (!list?.length) { treeWrap.innerHTML = '<div class=\"empty-state\" style=\"margin:14px 18px 0\"><p>没有匹配的教材，请调整搜索关键词。</p></div>'; return; } const frag = document.createDocumentFragment(); list.forEach(l1 => { const node1 = createTreeNode(l1.label, 1, l1.children?.length || 0); const ch1 = document.createElement('div'); ch1.className = 'tree-children open'; // 默认展开一级目录 (l1.children || []).forEach(l2 => { const node2 = createTreeNode(l2.label, 2, l2.children?.length || 0); const ch2 = document.createElement('div'); ch2.className = 'tree-children'; (l2.children || []).forEach(leaf => { const leafNode = createTreeNode(leaf.title, 3, 0, leaf); ch2.appendChild(leafNode); }); node2.appendChild(ch2); // 点击文件夹切换展开 node2.querySelector('.tree-label').addEventListener('click', ev => { ev.stopPropagation(); toggleChildren(ch2, node2); }); ch1.appendChild(node2); }); node1.appendChild(ch1); // 点击一级文件夹切换展开 node1.querySelector('.tree-label').addEventListener('click', ev => { ev.stopPropagation(); toggleChildren(ch1, node1); }); frag.appendChild(node1); }); treeWrap.appendChild(frag); } function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; } function createTreeNode(name, level, childCount, leafData = null) { const node = document.createElement('div'); node.className = `tree-node level-${level}`; const label = document.createElement('div'); label.className = 'tree-label'; const isFolder = !leafData; const safeName = escapeHtml(name); // 箭头（仅文件夹有） const arrowHtml = isFolder ? `<div class=\"tree-arrow ${childCount === 0 ? 'empty' : ''}\"><i class=\"fas fa-chevron-right\"></i></div>` : `<div class=\"tree-arrow empty\"></div>`; // 图标 const iconClass = isFolder ? `tree-icon folder level-${level}` : 'tree-icon file'; const iconFa = isFolder ? 'fa-folder-open' : 'fa-file-pdf'; const iconHtml = `<div class=\"${iconClass}\"><i class=\"fas ${iconFa}\"></i></div>`; // 名称 const nameHtml = `<div class=\"tree-name\">${safeName}</div>`; // 数量徽章（仅文件夹有且数量>0） const badgeHtml = isFolder && childCount > 0 ? `<div class=\"tree-count\">${childCount}</div>` : ''; label.innerHTML = `${arrowHtml}${iconHtml}${nameHtml}${badgeHtml}`; node.appendChild(label); // 文件点击选择 if (leafData) { label.onclick = e => { e.stopPropagation(); selectFile(leafData, label); }; } return node; } function toggleChildren(container, nodeEl) { const isOpen = container.classList.toggle('open'); nodeEl.classList.toggle('expanded', isOpen); const arrow = nodeEl.querySelector('.tree-arrow'); if (arrow) { arrow.classList.toggle('rotated', isOpen); } // 切换文件夹图标 const icon = nodeEl.querySelector('.tree-icon i'); if (icon) { if (isOpen) { icon.classList.remove('fa-folder'); icon.classList.add('fa-folder-open'); } else { icon.classList.remove('fa-folder-open'); icon.classList.add('fa-folder'); } } } function flattenCount(list) { let c = 0; (list || []).forEach(l1 => (l1.children || []).forEach(l2 => { c += (l2.children || []).length; })); return c; } // === Catalog Loading & Search === async function loadCatalog() { catalogCount.textContent = '加载中...'; try { const res = await fetch('catalog.json'); if (!res.ok) throw new Error('目录加载失败'); catalog = await res.json(); renderTree(catalog); showToast(`已加载 ${flattenCount(catalog)} 套教材目录`); } catch (e) { console.error(e); catalogCount.textContent = '加载失败'; showToast('教材目录加载失败'); renderTree([]); } } let _searchTimer = null; function onSearch(val) { // Sync both search inputs document.getElementById('globalSearch').value = val || ''; document.getElementById('treeSearch').value = val || ''; clearTimeout(_searchTimer); _searchTimer = setTimeout(() => { const kw = (val || '').trim().toLowerCase(); if (!kw) { renderTree(catalog); return; } renderTree(filterCatalog(catalog, kw)); }, 200); } function filterCatalog(nodes, q) { const out = []; nodes.forEach(n1 => { const c1 = { label: n1.label, children: [] }; (n1.children || []).forEach(n2 => { const c2 = { label: n2.label, children: [] }; (n2.children || []).forEach(leaf => { if ((leaf.title || '').toLowerCase().includes(q) || (n2.label || '').toLowerCase().includes(q) || (n1.label || '').toLowerCase().includes(q)) c2.children.push(leaf); }); if (c2.children.length) c1.children.push(c2); }); if (c1.children.length) out.push(c1); }); return out; } // === File Selection === function selectFile(item, labelEl) { console.log('selectFile called with:', item); if (!item || !item.pdf) { showToast('无效的教材文件'); console.error('Invalid item:', item); return; } current = item; document.querySelectorAll('.tree-label.selected').forEach(n => n.classList.remove('selected')); if (labelEl) labelEl.classList.add('selected'); statusFile.textContent = item.title; statusSize.textContent = item.size || ''; statusZoom.textContent = ''; pageLabel.textContent = '-'; pageTotal.textContent = '-'; pageInput.value = 1; pdfScale = 1; resetHistory(); // Close sidebar on mobile if (window.innerWidth <= 760) { document.getElementById('sidebar').classList.remove('mobile-open'); document.getElementById('sidebarBackdrop').classList.remove('show'); const fb = document.getElementById('sidebarFloatToggle'); if (fb) { fb.innerHTML = '<i class=\"fas fa-folder-tree\"></i>'; fb.title = '打开目录'; } } showPreview(item.pdf).then(() => { loadAnnotations(); const bmPage = loadBookmark(); if (bmPage && bmPage > 1 && bmPage <= (pdfDoc?.numPages || 9999)) { renderPage(bmPage); // Direct render instead of goToPage to avoid toast spam } drawAnnotations(); highlightActiveThumb(); }).catch((err) => { console.error('PDF preview failed:', err); showToast('PDF预览失败: ' + (err.message || '未知错误')); }); } // === PDF Preview === async function showPreview(src) { if (!src) { showToast('PDF地址为空'); return; } console.log('Loading PDF from:', src); emptyState.style.display = 'none'; pdfViewer.style.display = 'flex'; showLoading('正在加载 PDF...'); try { // 验证URL const url = new URL(src); if (!url.protocol.startsWith('http')) { throw new Error('仅支持HTTP/HTTPS协议的PDF文件'); } console.log('PDF URL验证通过:', url.href); pdfDoc = await pdfjsLib.getDocument({ url: src, cMapUrl: './pdfjs/cmaps/', cMapPacked: true, withCredentials: false }).promise; console.log('PDF加载成功，页数:', pdfDoc.numPages); currentPage = 1; const pageCount = pdfDoc.numPages; pageTotal.textContent = pageCount; pageInput.max = pageCount; populateThumbs(pageCount); await renderPage(1); hideLoading(); showToast(`PDF 已加载（${pageCount} 页）`); } catch (e) { console.error('PDF加载失败:', e); hideLoading(); let errorMsg = 'PDF 加载失败'; if (e.message) { if (e.message.includes('Missing PDF')) { errorMsg = 'PDF文件不存在或地址错误'; } else if (e.message.includes('CORS')) { errorMsg = '跨域访问被拒绝，PDF源站不支持外部访问'; } else if (e.message.includes('network')) { errorMsg = '网络错误，请检查网络连接'; } else { errorMsg = 'PDF加载失败: ' + e.message; } } showToast(errorMsg); } } function showLoading(text) { loadingText.textContent = text || '加载中...'; loadingOverlay.classList.add('show'); } function hideLoading() { loadingOverlay.classList.remove('show'); } async function renderPage(pageNum) { if (!pdfDoc) return; try { const page = await pdfDoc.getPage(pageNum); const viewport = page.getViewport({ scale: pdfScale }); const w = viewport.width, h = viewport.height; pdfCanvas.width = w; pdfCanvas.height = h; annotationCanvas.width = w; annotationCanvas.height = h; pdfCanvas.style.width = w + 'px'; pdfCanvas.style.height = h + 'px'; annotationCanvas.style.width = w + 'px'; annotationCanvas.style.height = h + 'px'; pdfCanvasWrap.style.width = w + 'px'; pdfCanvasWrap.style.height = h + 'px'; await page.render({ canvasContext: pdfCtx, viewport }).promise; currentPage = pageNum; pageLabel.textContent = pageNum; pageInput.value = pageNum; pageTotal.textContent = pdfDoc.numPages; updateZoomInfo(); drawAnnotations(); highlightActiveThumb(); updateHash(); } catch (e) { console.error('页面渲染失败', pageNum, e); showToast(`第 ${pageNum} 页渲染失败，请尝试刷新`); } } // === Thumbnails with Lazy Loading === function populateThumbs(count) { thumbList.innerHTML = ''; if (thumbObserver) { thumbObserver.disconnect(); thumbObserver = null; } if (!count || count < 1) { thumbList.innerHTML = '<div class=\"empty-state\" style=\"height:180px\"><p>无法生成缩略图</p></div>'; return; } thumbObserver = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) { const el = entry.target; const pg = Number(el.dataset.page); const canvas = el.querySelector('canvas'); if (canvas && !canvas.dataset.rendered) { renderThumb(pg, canvas); canvas.dataset.rendered = '1'; } thumbObserver.unobserve(el); } }); }, { root: thumbList, rootMargin: '200px' }); const frag = document.createDocumentFragment(); for (let i = 1; i <= count; i++) { const item = document.createElement('div'); item.className = 'thumb-item'; if (i === currentPage) item.classList.add('active'); item.dataset.page = i; const thumbCanvas = document.createElement('canvas'); thumbCanvas.width = 140; thumbCanvas.height = 192; thumbCanvas.style.cssText = 'display:block;width:100%;height:auto'; const numLabel = document.createElement('div'); numLabel.className = 'page-num'; numLabel.innerHTML = `${i} <span class=\"bookmark-indicator\"><i class=\"fas fa-bookmark\"></i></span>`; item.appendChild(thumbCanvas); item.appendChild(numLabel); item.onclick = () => goToPage(i); frag.appendChild(item); thumbObserver.observe(item); } thumbList.appendChild(frag); updateThumbBookmarks(); } function highlightActiveThumb() { document.querySelectorAll('.thumb-item.active').forEach(el => el.classList.remove('active')); const active = thumbList.querySelector(`.thumb-item[data-page=\"${currentPage}\"]`); if (active) { active.classList.add('active'); active.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); } } async function renderThumb(pageNum, canvas) { if (!pdfDoc) return; try { const page = await pdfDoc.getPage(pageNum); const viewport = page.getViewport({ scale: 0.15 }); canvas.width = viewport.width; canvas.height = viewport.height; await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise; } catch (e) { console.warn('缩略图渲染失败', pageNum, e); } } // === Navigation === function goToPage(n) { if (!pdfDoc) { showToast('请先选择教材'); return; } const page = Math.max(1, Math.min(pdfDoc.numPages, parseInt(n, 10) || 1)); pageInput.value = page; renderPage(page); } function prevPage() { if (currentPage > 1) goToPage(currentPage - 1); } function nextPage() { if (pdfDoc && currentPage < pdfDoc.numPages) goToPage(currentPage + 1); } // === Zoom === function updateZoomInfo() { zoomInfo.textContent = `${Math.round(pdfScale * 100)}%`; statusZoom.textContent = `缩放：${Math.round(pdfScale * 100)}%`; } function zoomIn() { if (!pdfDoc) return; pdfScale = Math.min(3, +(pdfScale + 0.15).toFixed(2)); renderPage(currentPage); } function zoomOut() { if (!pdfDoc) return; pdfScale = Math.max(0.4, +(pdfScale - 0.15).toFixed(2)); renderPage(currentPage); } async function zoomFit() { if (!pdfDoc) return; const page = await pdfDoc.getPage(currentPage); const vp = page.getViewport({ scale: 1 }); const body = document.getElementById('previewBody'); const availW = body.clientWidth - 48; const availH = body.clientHeight - 48; pdfScale = Math.min(2.5, Math.max(0.4, Math.min(availW / vp.width, availH / vp.height))); renderPage(currentPage); } // === Annotation Tools === function activateTool(tool) { activeTool = activeTool === tool ? null : tool; ['btnAnnotate', 'btnPen', 'btnText', 'btnEraser'].forEach(id => document.getElementById(id).classList.remove('active')); if (activeTool) { document.getElementById(`btn${tool.charAt(0).toUpperCase() + tool.slice(1)}`).classList.add('active'); showToast(`${{ annotate: '标注', pen: '画笔', text: '文字', eraser: '橡皮擦' }[tool]} 已激活`); } } function undoAction() { if (!annotationActions.length) { showToast('暂无可撤销操作'); return; } futureStack.push(annotationActions.pop()); saveAnnotations(); drawAnnotations(); showToast('已撤销'); } function redoAction() { if (!futureStack.length) { showToast('暂无可重做操作'); return; } annotationActions.push(futureStack.pop()); saveAnnotations(); drawAnnotations(); showToast('已重做'); } function attachAnnotationEvents() { annotationCanvas.addEventListener('pointerdown', handlePointerDown); annotationCanvas.addEventListener('pointermove', handlePointerMove); annotationCanvas.addEventListener('pointerup', handlePointerUp); annotationCanvas.addEventListener('pointerleave', handlePointerUp); } function handlePointerDown(event) { if (!activeTool || !pdfDoc) return; const rect = annotationCanvas.getBoundingClientRect(); const x = ((event.clientX - rect.left) / rect.width) * annotationCanvas.width; const y = ((event.clientY - rect.top) / rect.height) * annotationCanvas.height; if (activeTool === 'text') { const text = prompt('请输入文字：', ''); if (text) { const action = { type: 'text', page: currentPage, x, y, text, color: '#ffd966', font: '18px sans-serif' }; annotationActions.push(action); historyStack.push(action); futureStack = []; saveAnnotations(); drawAnnotations(); showToast('文字已添加'); } return; } drawing = true; const t = activeTool === 'eraser' ? 'eraser' : activeTool === 'annotate' ? 'highlight' : 'pen'; currentStroke = { type: t, page: currentPage, color: t === 'highlight' ? 'rgba(255,233,102,0.35)' : t === 'eraser' ? 'rgba(0,0,0,1)' : '#ff7f50', lineWidth: t === 'eraser' ? 28 : t === 'highlight' ? 28 : 3, composite: t === 'eraser' ? 'destination-out' : 'source-over', path: [{ x, y }] }; } function handlePointerMove(event) { if (!drawing || !currentStroke) return; const rect = annotationCanvas.getBoundingClientRect(); currentStroke.path.push({ x: ((event.clientX - rect.left) / rect.width) * annotationCanvas.width, y: ((event.clientY - rect.top) / rect.height) * annotationCanvas.height }); drawAnnotations(); } function handlePointerUp() { if (!drawing || !currentStroke) return; drawing = false; annotationActions.push(currentStroke); historyStack.push(currentStroke); futureStack = []; saveAnnotations(); currentStroke = null; } function drawAnnotations() { annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height); const actions = annotationActions.filter(a => !a.page || a.page === currentPage).concat(currentStroke ? [currentStroke] : []); actions.forEach(action => { if (action.type === 'text') { annCtx.save(); annCtx.fillStyle = action.color || '#ffd966'; annCtx.font = action.font || '18px sans-serif'; annCtx.fillText(action.text, action.x, action.y); annCtx.restore(); return; } annCtx.save(); annCtx.globalCompositeOperation = action.composite || 'source-over'; annCtx.strokeStyle = action.color; annCtx.lineWidth = action.lineWidth; annCtx.lineCap = 'round'; annCtx.lineJoin = 'round'; annCtx.beginPath(); action.path.forEach((p, i) => { i === 0 ? annCtx.moveTo(p.x, p.y) : annCtx.lineTo(p.x, p.y); }); annCtx.stroke(); annCtx.restore(); }); } function resetHistory() { historyStack = []; futureStack = []; annotationActions = []; currentStroke = null; annCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height); } // === Download & Share === function downloadPDF() { if (!current) { showToast('请先选择教材'); return; } const link = document.createElement('a'); link.href = current.pdf; link.download = `${current.title}`; link.target = '_blank'; document.body.appendChild(link); link.click(); document.body.removeChild(link); showToast('已开始下载'); } function shareDocument() { if (!current) { showToast('请先选择教材'); return; } updateHash(); const url = window.location.href; navigator.clipboard?.writeText(url).then(() => showToast('已复制分享链接')).catch(() => showToast('无法复制链接')); } // === URL Hash === function updateHash() { if (!current) return; const title = encodeURIComponent(current.title); const hash = `#${title}?page=${currentPage}`; if (window.location.hash !== hash) history.replaceState(null, '', hash); } // === Fullscreen === function toggleFullscreen() { document.body.classList.toggle('fullscreen'); const isFS = document.body.classList.contains('fullscreen'); document.getElementById('btnFullscreen').classList.toggle('active', isFS); showToast(isFS ? '全屏模式（按 Esc 退出）' : '已退出全屏'); if (pdfDoc) setTimeout(() => zoomFit(), 100); } // === Mobile Sidebar === function toggleSidebar() { const sb = document.getElementById('sidebar'); const bd = document.getElementById('sidebarBackdrop'); const btn = document.getElementById('sidebarFloatToggle'); const isOpen = sb.classList.toggle('mobile-open'); bd.classList.toggle('show', isOpen); if (btn) { btn.innerHTML = isOpen ? '<i class=\"fas fa-times\"></i>' : '<i class=\"fas fa-folder-tree\"></i>'; btn.title = isOpen ? '关闭目录' : '打开目录'; } } // === Keyboard Shortcuts === function toggleShortcuts() { // 快捷键帮助不需要授权 document.getElementById('shortcutHint').classList.toggle('show'); } // 授权检查辅助函数 function requireAuth() { const token = localStorage.getItem('ct_token'); if (!token) { showToast('⚠️ 请先设置 Token 以使用此功能'); showTokenModal(); return false; } return true; } document.addEventListener('keydown', (e) => { // Ignore when typing in input if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return; // 快捷键帮助不需要授权 if (e.key === '?' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); toggleShortcuts(); return; } // 所有其他功能需要授权 if (!requireAuth()) { return; } // Ctrl/Cmd 组合键 if (e.ctrlKey || e.metaKey) { switch(e.key) { case 'f': case 'F': e.preventDefault(); document.getElementById('globalSearch').focus(); showToast('搜索教材'); break; case 'b': case 'B': e.preventDefault(); toggleBookmark(); break; case 't': case 'T': e.preventDefault(); toggleSidebar(); break; case 'm': case 'M': e.preventDefault(); toggleFullscreen(); break; case 'ArrowLeft': e.preventDefault(); goToPage(1); // 跳到第一页 break; case 'ArrowRight': e.preventDefault(); goToPage(pdfDoc ? pdfDoc.numPages : 1); // 跳到最后一页 break; } return; } // 普通快捷键 switch (e.key) { case 'ArrowLeft': case 'ArrowUp': case 'PageUp': e.preventDefault(); prevPage(); break; case 'ArrowRight': case 'ArrowDown': case 'PageDown': case ' ': // 空格键 e.preventDefault(); nextPage(); break; case 'Home': e.preventDefault(); goToPage(1); break; case 'End': e.preventDefault(); if (pdfDoc) goToPage(pdfDoc.numPages); break; case '+': case '=': e.preventDefault(); zoomIn(); break; case '-': case '_': e.preventDefault(); zoomOut(); break; case '0': e.preventDefault(); zoomFit(); break; case '1': case '2': case '3': case '4': case '5': case '6': case '7': case '8': case '9': e.preventDefault(); // 数字键快速跳转页码（按数字n跳转到第n*10页） const targetPage = parseInt(e.key) * 10; if (pdfDoc && targetPage <= pdfDoc.numPages) { goToPage(targetPage); showToast(`跳转到第 ${targetPage} 页`); } break; case 'f': case 'F': e.preventDefault(); toggleFullscreen(); break; case 'b': case 'B': e.preventDefault(); toggleBookmark(); break; case 't': case 'T': e.preventDefault(); toggleSidebar(); break; case '/': e.preventDefault(); document.getElementById('globalSearch').focus(); showToast('搜索教材'); break; case 'g': case 'G': e.preventDefault(); // G键：输入页码跳转 const pageInputEl = document.getElementById('pageInput'); if (pageInputEl) { pageInputEl.focus(); pageInputEl.select(); showToast('输入页码后按Enter跳转'); } break; case 'Escape': if (document.body.classList.contains('fullscreen')) toggleFullscreen(); document.getElementById('shortcutHint').classList.remove('show'); closeModal(); // 关闭右键菜单 const contextMenu = document.getElementById('contextMenu'); if (contextMenu) contextMenu.style.display = 'none'; break; } }); // === Token === function showTokenModal() { document.getElementById('tokenModal').classList.add('show'); } function closeModal() { document.getElementById('tokenModal').classList.remove('show'); } function submitToken() { const token = document.getElementById('tokenInput').value.trim(); if (!token) { showToast('请输入 Token'); return; } localStorage.setItem('ct_token', token); statusToken.textContent = token.includes('PRE') ? '会员用户' : '普通用户'; closeModal(); showToast('Token 已保存'); } // === Toast === function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 2400); } // === Splitter === function enableSplitters() { document.querySelectorAll('.splitter-v').forEach(splitter => { splitter.addEventListener('mousedown', e => { e.preventDefault(); const prev = splitter.previousElementSibling; const next = splitter.nextElementSibling; const startX = e.clientX; const prevW = prev.getBoundingClientRect().width; const nextW = next.getBoundingClientRect().width; const onMove = ev => { const dx = ev.clientX - startX; const min = 120; let np = Math.max(min, prevW + dx); let nn = Math.max(min, nextW - dx); if (np + nn > prevW + nextW) return; prev.style.width = np + 'px'; next.style.width = nn + 'px'; }; const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }; document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp); }); }); } // === Find leaf by title === function findLeafByTitle(title) { for (const l1 of catalog) for (const l2 of (l1.children || [])) for (const leaf of (l2.children || [])) if (leaf.title === title) return leaf; return null; } // === Init === async function init() { const token = localStorage.getItem('ct_token'); if (token) statusToken.textContent = token.includes('PRE') ? '会员用户' : '普通用户'; await loadCatalog(); // Auto-open sidebar on mobile so users see the tree if (window.innerWidth <= 760) { document.getElementById('sidebar').classList.add('mobile-open'); document.getElementById('sidebarBackdrop').classList.add('show'); } enableSplitters(); attachAnnotationEvents(); // Handle ?file= parameter (from main site redirect) const params = new URLSearchParams(window.location.search); const fileParam = params.get('file'); if (fileParam) { try { const src = decodeURIComponent(fileParam); // Security: only allow trusted domains const allowedOrigins = ['https://raw.githubusercontent.com', window.location.origin]; const isAllowed = allowedOrigins.some(o => src.startsWith(o)); if (!isAllowed) { showToast('不支持的外部链接，仅允许 GitHub 教材库来源'); return; } current = { title: src.split('/').pop() || '外部PDF', pdf: src, size: '' }; statusFile.textContent = current.title; await showPreview(current.pdf); return; } catch (e) { console.error('file参数加载失败', e); showToast('通过链接加载 PDF 失败'); } } // Handle hash navigation if (window.location.hash) { const hashValue = decodeURIComponent(window.location.hash.slice(1)); const parts = hashValue.split('?page='); const hashTitle = parts[0]; const pageFromHash = parts[1] ? parseInt(parts[1], 10) : null; const matched = findLeafByTitle(hashTitle); if (matched) { selectFile(matched, null); if (pageFromHash && !isNaN(pageFromHash)) { setTimeout(() => goToPage(pageFromHash), 500); } } } } init(); </script> <!-- AIGC: {\"Label\":\"value1\",\"ContentProducer\":\"001191110000802100433B11010001191110000802100433B11010\",\"ProduceID\":\"c7acaafc-a853-4154-ae01-ce9bb018dc4a\",\"ReservedCode1\":\"72dafc97cd38b92e5f3d5cdfd0dfbbe6\",\"ContentPropagator\":\"001191110000802100433B11010001191110000802100433B11010\",\"PropagateID\":\"0e9ace9f-0d07-4246-a770-d4d0226276a8\",\"ReservedCode2\":\"2734827274df537123a472bf4de01eb5\"} --> </body> </html>"